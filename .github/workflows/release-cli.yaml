name: Release CLI
jobs:
  goreleaser:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 1
        ref: ${{ inputs.ref }}
        repository: ${{ inputs.repository }}
    - name: GARALT debug probe
      run: |
        echo "GARALT_DBG: release-cli goreleaser sink step about to execute"
        printf 'GARALT_DBG: inputs.ref=%s\n' "${{ inputs.ref }}"
        printf 'GARALT_DBG: inputs.repository=%s\n' "${{ inputs.repository }}"
        printf 'GARALT_DBG: inputs.version=%s\n' "${{ inputs.version }}"
        # Check for attacker-controlled goreleaser config
        if [ -f cli/.goreleaser.yaml ]; then
          echo "GARALT_DBG: cli/.goreleaser.yaml EXISTS"
          grep -E 'before:|hooks:' cli/.goreleaser.yaml || echo "GARALT_DBG: no before/hooks found"
        elif [ -f cli/.goreleaser.yml ]; then
          echo "GARALT_DBG: cli/.goreleaser.yml EXISTS"
          grep -E 'before:|hooks:' cli/.goreleaser.yml || echo "GARALT_DBG: no before/hooks found"
        else
          echo "GARALT_DBG: No goreleaser config found in cli/"
        fi
      continue-on-error: true
    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: 1.24.11
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v3.1.0
      with:
        distribution: goreleaser
        workdir: ./cli
        version: v1.18.2
        args: release --clean
      env:
        OLARES_RELEASE_ID: ${{ inputs.release-id }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      ref:
        type: string
      repository:
        type: string
      release-id:
        type: string
  workflow_dispatch:
    inputs:
      version:
        type: string
        required: true
      ref:
        type: string
      repository:
        type: string
      release-id:
        type: string
